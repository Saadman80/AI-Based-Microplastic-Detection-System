# ============================================================
#  Microplastic Detection — YOLO26 Training Dataset
#  In-house MINA Lab (Univ. of Dhaka) set + 4 community datasets.
#  Morphological taxonomy (GESAMP / Free et al. standard).
#  Updated: 2026-07-11
# ============================================================

# Root path. On Kaggle the training notebook auto-detects the mounted path and
# regenerates this file, so this local value is only used for local runs.
path: C:/Users/revon/Desktop/microplastic_detection_system/microplastic_yolo26_training_dataset

train: train/images
val: valid/images
test: test/images

# Number of classes
nc: 4

# Class names (index -> name). Index 3 'pellet' consolidates the
# rounded/spherical morphology (source 'pellet' + source 'microbeads').
names:
  0: fiber
  1: film
  2: fragment
  3: pellet
